server.port=${PORT:8080}
spring.application.name=bank-agent-java

# Google Cloud
app.google-cloud-project=${GOOGLE_CLOUD_PROJECT:}
app.google-cloud-location=${GOOGLE_CLOUD_LOCATION:us-central1}
app.gemini-model=${GEMINI_MODEL:gemini-2.5-flash}
app.bq-dataset=${BQ_DATASET:}

# Savings rates
app.savings-rate=${ESTIMATED_SAVINGS_RATE:0.035}
app.isa-rate=${ESTIMATED_ISA_RATE:0.045}

# Actuator
management.endpoints.web.exposure.include=health,info
